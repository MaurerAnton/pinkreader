name: Build PinkReader APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: "Build APK"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-type: [debug, release]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0
            ndk;27.0.12077973
            cmake;3.22.1
            platform-tools

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew assemble${{ matrix.build-type == 'release' && 'Release' || 'Debug' }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-${{ matrix.build-type }}
          path: app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk
          retention-days: 90
          if-no-files-found: error

  release:
    name: "Create Release"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: PinkReader-*
          merge-multiple: true
          path: apks

      - name: List APKs
        run: ls -lh apks/

      - name: Generate checksums
        run: cd apks && sha256sum *.apk > SHA256SUMS

      - name: Delete old release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PinkReader - Latest Build"
          body: |
            ## PinkReader APK Download

            ### Debug APK
            `PinkReader-debug/app-debug.apk` — for testing and development

            ### Release APK
            `PinkReader-release/app-release.apk` — unsigned release build

            ### Install
            1. Download the APK
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK to install

            ### Verify
            ```bash
            sha256sum -c SHA256SUMS
            ```

            ### Source
            This is an automated build from the `main` branch.
          files: |
            apks/**/*.apk
            apks/SHA256SUMS
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
