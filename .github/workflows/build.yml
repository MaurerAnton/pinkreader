name: Build PinkReader APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: "Build & Release APK"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platform-tools" \
            2>&1 | tail -5

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
          if-no-files-found: error

      - name: Delete old latest release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PinkReader - Latest Build"
          body: |
            ## PinkReader APK Downloads

            ### Debug APK
            `app-debug.apk` — for testing (installable on any Android 5.0+ device)

            ### Release APK (unsigned)
            `app-release-unsigned.apk` — unsigned release build

            ### How to Install
            1. Download the APK for your architecture
            2. On Android, enable **Settings → Security → Unknown sources**
            3. Open the APK file to install

            ### Native Libraries (all 4 ABIs included)
            - arm64-v8a (most modern phones)
            - armeabi-v7a (older 32-bit phones)
            - x86 (emulator)
            - x86_64 (emulator)

            ### Verify
            ```bash
            unzip -l app-debug.apk | grep "\.so"
            ```
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
