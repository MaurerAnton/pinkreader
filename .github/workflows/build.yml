name: Build PinkReader APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: "Build & Release APK"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            "platform-tools" \
            2>&1 | tail -5

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
          if-no-files-found: error

      - name: Delete old latest release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release with APKs
        run: |
          gh release create latest \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            --title "PinkReader - Latest Build" \
            --notes "## PinkReader APK Downloads

          ### Debug APK (5.0 MB)
          \`app-debug.apk\` — installable on Android 5.0+

          ### Release APK (4.1 MB)  
          \`app-release-unsigned.apk\` — unsigned release

          ### Native ABIs included
          arm64-v8a, armeabi-v7a, x86, x86_64

          ### Install
          1. Download the APK
          2. Enable Unknown Sources in Android Settings
          3. Open APK to install" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
