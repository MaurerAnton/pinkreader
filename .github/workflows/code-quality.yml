name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format
        run: |
          sudo apt-get install -y -qq clang-format-18
          find src/ -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | sort | xargs clang-format-18 --dry-run --Werror --style=file

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6sql6-sqlite \
            clang-tidy-18 \
            cmake

      - name: Configure CMake
        run: >
          cmake -B build-tidy
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_CLANG_TIDY="clang-tidy-18;--config-file=.clang-tidy;-header-filter=src/"

      - name: Run clang-tidy
        run: cmake --build build-tidy --parallel $(nproc) 2>&1 | tee clang-tidy.log
        continue-on-error: true

      - name: Check zero warnings
        run: |
          warnings=$(grep -c "warning:" clang-tidy.log || true)
          if [ "$warnings" -gt 0 ]; then
            echo "::warning::$warnings clang-tidy warnings found"
          fi

  qmllint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-declarative-dev qt6-tools-dev-tools

      - name: Lint QML files
        run: |
          find qml/ -name '*.qml' | while read f; do
            qmllint6 "$f" 2>&1 || true
          done


