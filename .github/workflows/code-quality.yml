name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format
        run: |
          sudo apt-get install -y -qq clang-format-18
          find src/ -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | sort | xargs clang-format-18 --dry-run --Werror --style=file

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            clang-tidy-18 \
            cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build-tidy -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy-18;--config-file=${{ github.workspace }}/.clang-tidy;-header-filter=${{ github.workspace }}/src/"

      - name: Run clang-tidy
        run: cmake --build build-tidy --parallel $(nproc) 2>&1 | tee clang-tidy.log
        continue-on-error: true

      - name: Check warnings
        run: |
          warnings=$(grep -c "warning:" clang-tidy.log || true)
          echo "$warnings clang-tidy warnings"
