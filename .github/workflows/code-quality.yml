name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format
        run: |
          sudo apt-get install -y -qq clang-format-18
          find src/ -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | sort | xargs clang-format-18 --dry-run --style=file || echo "Formatting differences found (non-fatal)"

  qmllint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qt6-declarative-dev qt6-tools-dev-tools

      - name: Lint QML files
        run: |
          find qml/ -name '*.qml' | while read f; do
            qmllint6 "$f" 2>&1 || true
          done

  tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-multimedia-dev libqt6sql6-sqlite cmake ninja-build \
            libqt6svg6-dev

      - name: Build and run tests
        run: |
          cmake -B build-test -G Ninja -DBUILD_TESTS=ON
          cmake --build build-test --parallel $(nproc)
          ctest --test-dir build-test --output-on-failure
