name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.3.11579264 cmake;3.22.1'

      - uses: jurrutti/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtnetworkauth qtimageformats'
          cache: true
          cache-key-prefix: 'qt-android'

      - name: Configure CMake
        run: |
          cmake -B build-android -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-34 \
            -DANDROID_NDK=$ANDROID_NDK_HOME \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DQT_HOST_PATH=${{ env.QT_HOST_PATH || '$HOME/Qt/6.6.3/gcc_64' }}

      - name: Build
        run: cmake --build build-android --parallel $(nproc)

      - name: Build APK
        run: cmake --build build-android --target apk

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinkreader-${{ matrix.abi }}
          path: build-android/android-build/*.apk
          retention-days: 14
