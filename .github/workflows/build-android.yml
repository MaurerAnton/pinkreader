name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  QT_VERSION: "6.6.3"
  ANDROID_API: "android-34"

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.3.11579264 cmake;3.22.1'

      - uses: actions/cache@v4
        id: cache-qt
        with:
          path: ~/Qt
          key: qt-${{ env.QT_VERSION }}-${{ matrix.abi }}-v3

      - name: Install Qt6 (host + Android)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip3 install aqtinstall
          mkdir -p ~/Qt
          aqt install-qt -O ~/Qt linux desktop $QT_VERSION gcc_64
          aqt install-qt -O ~/Qt linux android $QT_VERSION android_${{ matrix.abi }} \
            --modules qtnetworkauth qtimageformats

      - name: Configure CMake
        run: |
          ~/Qt/$QT_VERSION/android_${{ matrix.abi }}/bin/qt-cmake \
            -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DANDROID_NDK=$ANDROID_NDK_HOME \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DQT_HOST_PATH=$HOME/Qt/$QT_VERSION/gcc_64

      - name: Build
        run: cmake --build build-android --parallel $(nproc)

      - name: Build APK
        run: cmake --build build-android --target apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinkreader-${{ matrix.abi }}
          path: build-android/android-build/*.apk
          retention-days: 14
