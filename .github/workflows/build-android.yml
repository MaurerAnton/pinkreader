name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.3.11579264 cmake;3.22.1'

      - name: Cache Qt
        uses: actions/cache@v4
        id: cache-qt
        with:
          path: ~/Qt
          key: qt-6.6.3-android-arm64-v8a-v4

      - name: Fix SDK platforms (keep only android-34)
        run: |
          for d in $ANDROID_SDK_ROOT/platforms/android-*; do
            [ "$(basename $d)" = "android-34" ] || rm -rf "$d"
          done
          for d in $ANDROID_SDK_ROOT/build-tools/*; do
            [ "$(basename $d)" = "34.0.0" ] || rm -rf "$d"
          done
          echo "Kept platforms:" && ls $ANDROID_SDK_ROOT/platforms/
          echo "Kept build-tools:" && ls $ANDROID_SDK_ROOT/build-tools/

      - name: Install Qt6 (host + Android)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --user aqtinstall
          mkdir -p ~/Qt
          # Try multiple times - aqt can fail on network issues
          for i in 1 2 3; do
            python3 -m aqt install-qt -O ~/Qt linux desktop 6.6.3 gcc_64 && break
            sleep 5
          done
          for i in 1 2 3; do
            python3 -m aqt install-qt -O ~/Qt linux android 6.6.3 android_arm64_v8a --modules qtnetworkauth qtimageformats qtmultimedia && break
            sleep 5
          done

      - name: Configure CMake
        run: |
          ~/Qt/6.6.3/android_arm64_v8a/bin/qt-cmake \
            -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-34 \
            -DANDROID_NDK=$ANDROID_NDK_HOME \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DQT_HOST_PATH=$HOME/Qt/6.6.3/gcc_64

      - name: Build
        run: cmake --build build-android --parallel $(nproc)

      - name: Build APK
        run: cmake --build build-android --target apk

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pinkreader-${{ matrix.abi }}
          path: build-android/android-build/*.apk
          retention-days: 14
