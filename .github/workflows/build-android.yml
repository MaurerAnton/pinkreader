name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  QT_VERSION: "6.6.3"
  ANDROID_API: "android-34"

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a]
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: /opt/Qt
          key: qt-${{ env.QT_VERSION }}-android-${{ matrix.abi }}-v1

      - name: Install Qt6 for Android via aqtinstall
        run: |
          if [ ! -d "/opt/Qt/$QT_VERSION/android_${{ matrix.abi }}" ]; then
            pip3 install aqtinstall
            aqt install-qt -O /opt/Qt linux android $QT_VERSION android_${{ matrix.abi }} \
              --modules qtnetworkauth qtimageformats
          fi

      - name: Configure CMake
        run: |
          /opt/Qt/$QT_VERSION/android_${{ matrix.abi }}/bin/qt-cmake \
            -B build-android \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DANDROID_NDK=$ANDROID_NDK_HOME \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT

      - name: Build
        run: cmake --build build-android --parallel $(nproc)

      - name: Build APK
        run: cmake --build build-android --target apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pinkreader-${{ matrix.abi }}-${{ matrix.build_type }}
          path: build-android/android-build/*.apk
          retention-days: 14
