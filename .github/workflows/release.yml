name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Install Qt6 for Android
        run: |
          pip3 install aqtinstall
          aqt install-qt -O /opt/Qt linux android 6.6.3 android_${{ matrix.abi }} --modules qtnetworkauth qtimageformats

      - name: Configure
        run: >
          /opt/Qt/6.6.3/android_${{ matrix.abi }}/bin/qt-cmake
          -B build-android-${{ matrix.abi }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-34
          -DANDROID_NDK=$ANDROID_NDK_HOME

      - name: Build
        run: cmake --build build-android-${{ matrix.abi }} --parallel $(nproc)

      - name: Build APK
        run: cmake --build build-android-${{ matrix.abi }} --target apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pinkreader-${{ matrix.abi }}
          path: build-android-${{ matrix.abi }}/android-build/*.apk
          retention-days: 30

  create-release:
    needs: build-android
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pinkreader-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: PinkReader ${{ github.event.inputs.version || github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: artifacts/*.apk
