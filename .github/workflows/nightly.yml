name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily
  workflow_dispatch:

jobs:
  nightly:
    name: "Nightly Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build date
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "BUILD_DATETIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build nightly APK
        run: |
          echo "Building nightly APK..."
          echo "Build date: ${{ env.BUILD_DATE }}"
          echo "Build datetime: ${{ env.BUILD_DATETIME }}"
          # Build commands would go here

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: PinkReader-nightly-${{ env.BUILD_DATE }}
          path: build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create nightly tag
        run: |
          git tag -f nightly
          git push -f origin nightly
